services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: geneweb-app
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    command: uvicorn src.geneweb.main:app --reload --host 0.0.0.0 --port 8000
