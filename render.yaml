databases:
  - name: geneweb-db
    plan: free
    databaseName: geneweb
    user: geneweb

services:
  - type: web
    name: geneweb
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geneweb-db
          property: connectionString
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
