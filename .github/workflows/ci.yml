name: Enhanced CI

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

env:
  PYPI_CACHE_KEY_FILES: |
    requirements.txt

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: [3.11, 3.13]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Cache pip (Unix)
        if: runner.os != 'Windows'
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache pip (Windows)
        if: runner.os == 'Windows'
        id: cache-pip-windows
        uses: actions/cache@v4
        with:
          path: '%USERPROFILE%\\AppData\\Local\\pip'
          key: windows-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            windows-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        id: run-tests
        shell: bash
        run: |
          python -m pytest tests/ --cov=src/geneweb --cov-report=term --cov-report=html -q 2>&1 | tee test-output.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          
          # Extract test results
          PASSED=$(grep -Eo '([0-9]+) passed' test-output.log | awk '{s+=$1} END {print s+0}') || PASSED=0
          FAILED=$(grep -Eo '([0-9]+) failed' test-output.log | awk '{s+=$1} END {print s+0}') || FAILED=0
          SKIPPED=$(grep -Eo '([0-9]+) skipped' test-output.log | awk '{s+=$1} END {print s+0}') || SKIPPED=0
          TOTAL=$((PASSED + FAILED + SKIPPED))

          echo "tests_passed=$PASSED" >> $GITHUB_OUTPUT
          echo "tests_failed=$FAILED" >> $GITHUB_OUTPUT
          echo "tests_skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "tests_total=$TOTAL" >> $GITHUB_OUTPUT
          
          exit $TEST_EXIT_CODE

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}-py${{ matrix.python }}
          path: htmlcov/
          retention-days: 7

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Results for ${{ matrix.os }} - Python ${{ matrix.python }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Passed: ${{ steps.run-tests.outputs.tests_passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Failed: ${{ steps.run-tests.outputs.tests_failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- ⏭️ Skipped: ${{ steps.run-tests.outputs.tests_skipped }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Total: ${{ steps.run-tests.outputs.tests_total }}" >> $GITHUB_STEP_SUMMARY
