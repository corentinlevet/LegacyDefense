name: Enhanced CI

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

env:
  PYPI_CACHE_KEY_FILES: |
    code/requirements.txt
    code/requirements-dev.txt

jobs:
  build:
    name: Build matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: [3.11, 3.13]

    outputs:
      total_matrix_jobs: ${{ strategy.job-count || 0 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Start Build Timer
        uses: ./.github/actions/ci-utils
        with:
          command: start-timer

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Cache pip (Unix)
        if: runner.os != 'Windows'
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('code/requirements.txt', 'code/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache pip (Windows)
        if: runner.os == 'Windows'
        id: cache-pip-windows
        uses: actions/cache@v4
        with:
          path: '%USERPROFILE%\\AppData\\Local\\pip'
          key: windows-pip-${{ hashFiles('code/requirements.txt', 'code/requirements-dev.txt') }}
          restore-keys: |
            windows-pip-

      - name: Install Python dependencies
        uses: ./.github/actions/install-deps

      - name: Run linters
        run: |
          set -euo pipefail
          python -m pip install -r code/requirements-dev.txt
          black --check code
          isort --check-only code
          flake8 code
          mypy code
        shell: bash

      - name: Run tests
        id: run-tests
        shell: bash
        run: |
          set -o pipefail
          PYTHONPATH=code pytest -q --disable-warnings code/tests 2>&1 | tee build-output.log || true

          # Extract numeric results using grep+awk and export to GITHUB_OUTPUT
          PASSED=$(grep -Eo '([0-9]+) passed' build-output.log | awk '{s+=$1} END {print s+0}') || PASSED=0
          FAILED=$(grep -Eo '([0-9]+) failed' build-output.log | awk '{s+=$1} END {print s+0}') || FAILED=0
          SKIPPED=$(grep -Eo '([0-9]+) skipped' build-output.log | awk '{s+=$1} END {print s+0}') || SKIPPED=0
          TOTAL=$((PASSED + FAILED + SKIPPED))

          echo "tests_passed=$PASSED" >> $GITHUB_OUTPUT
          echo "tests_failed=$FAILED" >> $GITHUB_OUTPUT
          echo "tests_skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "tests_total=$TOTAL" >> $GITHUB_OUTPUT

          if grep -E '\bfailed\b' build-output.log >/dev/null 2>&1; then
            exit 1
          fi

      - name: Collect Build Metrics
        id: collect-metrics
        uses: ./.github/actions/ci-utils
        with:
          command: collect-metrics
          os: ${{ matrix.os }}
          runtime-version: ${{ matrix.python }}
          cache-hit: ${{ runner.os == 'Windows' && steps.cache-pip-windows.outputs.cache-hit || steps.cache-pip.outputs.cache-hit }}
          tests-total: ${{ steps.run-tests.outputs.tests_total || '0' }}
          tests-passed: ${{ steps.run-tests.outputs.tests_passed || '0' }}
          tests-failed: ${{ steps.run-tests.outputs.tests_failed || '0' }}
          tests-skipped: ${{ steps.run-tests.outputs.tests_skipped || '0' }}

  build-results:
    name: Generate Summary
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Generate Build Summary
        uses: ./.github/actions/ci-utils
        with:
          command: generate-summary
          total-builds: ${{ needs.build.outputs.total_matrix_jobs }}
