name: Install Python Dependencies
description: Install base and dev requirements

runs:
  using: "composite"
  steps:
    - name: Create virtualenv (Unix)
      if: runner.os != 'Windows'
      run: |
        python -m venv .venv
        echo "VIRTUAL_ENV=$(pwd)/.venv" >> $GITHUB_ENV
        echo "PATH=$(pwd)/.venv/bin:$PATH" >> $GITHUB_ENV
      shell: bash

    - name: Create virtualenv (Windows)
      if: runner.os == 'Windows'
      run: |
        python -m venv .venv
        # Write Windows-friendly env vars to GITHUB_ENV
        $venv = Join-Path $PWD '.venv'
        Add-Content -Path $env:GITHUB_ENV -Value "VIRTUAL_ENV=$venv"
        $newPath = "$venv\Scripts;$env:PATH"
        Add-Content -Path $env:GITHUB_ENV -Value "PATH=$newPath"
      shell: pwsh

    - name: Upgrade pip and install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r code/requirements.txt
        pip install -r code/requirements-dev.txt
      shell: bash
