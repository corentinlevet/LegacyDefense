[tool.isort]
profile = "black"
line_length = 88
skip = [".venv", "__pycache__", ".mypy_cache", ".pytest_cache"]

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*", "*/__pycache__/*", "*/migrations/*", "alembic/*"]

[tool.coverage.report]
fail_under = 65
show_missing = true
precision = 2
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
    "pass",
    "except ImportError",
]

[tool.coverage.html]
directory = "htmlcov"

[tool.bandit]
targets = ["src"]
exclude_dirs = ["tests", ".venv", "__pycache__"]
skips = [
    "B101", # assert statements are fine in tests
    "B105", # false positive: empty-string config fields ("passwd" key names) and genealogy token "od"
    "B110", # intentional try/except/pass for date-parsing fallbacks
]
