<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livre des sources - {{ genealogy_name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container mt-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Livre des sources</h1>
            <a href="/genealogy/{{ genealogy_name }}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left mr-1"></i> Retour à la généalogie
            </a>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>Toutes les sources</h5>
            </div>
            <div class="card-body">
                <ul class="list-group">
                    {% for source in sources %}
                    <li class="list-group-item">{{ source }}</li>
                    {% endfor %}
                </ul>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center mt-5 mb-3">
            <p class="text-muted">
                GeneWeb v.1.0.0 &copy; 2025
            </p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
