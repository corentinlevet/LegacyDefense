<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importer un fichier GEDCOM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Importer un fichier GEDCOM pour {{ genealogy_name }}</h4>
                        <a href="/gwd" class="btn btn-sm btn-outline-secondary">
                            <i class="fas fa-arrow-left mr-1"></i> Retour aux généalogies
                        </a>
                    </div>
                    <div class="card-body">
                        <form id="gedcomUploadForm" method="POST" enctype="multipart/form-data">
                            <div class="form-group">
                                <label for="gedcomFile">Sélectionnez votre fichier GEDCOM (.ged)</label>
                                <input type="file" class="form-control-file" id="gedcomFile" name="gedcom_file" accept=".ged" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Importer</button>
                        </form>
                        <div id="responseMessage" class="message mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlPathParts = window.location.pathname.split('/');
            const genealogyName = urlPathParts[urlPathParts.length - 2]; // Assumes /genealogies/{name}/import

            // Update the title with the genealogy name
            document.querySelector('h4.mb-0').textContent = `Importer un fichier GEDCOM pour ${genealogyName}`;

            document.getElementById('gedcomUploadForm').addEventListener('submit', async function(event) {
                event.preventDefault();

                const fileInput = document.getElementById('gedcomFile');
                const file = fileInput.files[0];
                console.log('Fichier sélectionné:', file);
                const responseMessage = document.getElementById('responseMessage');

                responseMessage.style.display = 'none';
                responseMessage.classList.remove('success', 'error');

                if (!file) {
                    responseMessage.classList.add('error');
                    responseMessage.textContent = 'Veuillez sélectionner un fichier GEDCOM.';
                    responseMessage.style.display = 'block';
                    return;
                }

                const formData = new FormData();
                formData.append('gedcom_file', file);

                try {
                    const response = await fetch(`/api/genealogies/${genealogyName}/import`, {
                        method: 'POST',
                        body: formData,
                    });

                    const data = await response.json();

                    if (response.ok) {
                        responseMessage.classList.add('success');
                        responseMessage.textContent = data.message || 'Fichier GEDCOM importé avec succès !';
                    } else {
                        responseMessage.classList.add('error');
                        responseMessage.textContent = data.detail || data.message || 'Erreur lors de l\'importation du fichier GEDCOM.';
                    }
                } catch (error) {
                    console.error('Erreur réseau lors de l\'importation:', error);
                    responseMessage.classList.add('error');
                    responseMessage.textContent = 'Une erreur réseau est survenue lors de l\'importation.';
                } finally {
                    responseMessage.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
