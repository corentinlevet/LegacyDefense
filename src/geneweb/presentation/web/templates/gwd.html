<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeneWeb - Choisir une base</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Choisir une généalogie</h4>
            <a href="/" class="btn btn-sm btn-outline-secondary">
              <i class="fas fa-home mr-1"></i> Accueil
            </a>
          </div>
          <div class="card-body">
            <p class="text-muted">Entrez le nom de la base de données que vous souhaitez consulter.</p>
            <form class="form-inline" id="openGenealogyForm">
              <div class="input-group w-100">
                <input type="text" class="form-control" id="genealogyNameInput" placeholder="Nom de la base" aria-label="Nom de la base" required>
                <div class="input-group-append">
                  <button class="btn btn-primary" type="submit">Ouvrir</button>
                </div>
              </div>
            </form>
            <hr>
            <h6 class="mt-4">Bases disponibles :</h6>
            <ul class="list-group" id="genealogyList">
              <!-- Les généalogies seront chargées ici par JavaScript -->
              <li class="list-group-item text-center">Chargement des généalogies...</li>
            </ul>
            <hr>
            <a href="/genealogies/create" class="btn btn-success mt-3">
                <i class="fas fa-plus-circle mr-2"></i> Créer une nouvelle généalogie
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
        fetchGenealogies();

        document.getElementById('openGenealogyForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const genealogyName = document.getElementById('genealogyNameInput').value;
            if (genealogyName) {
                window.location.href = `/genealogy/${genealogyName}`;
            }
        });
    });

    async function fetchGenealogies() {
        const genealogyList = document.getElementById('genealogyList');
        genealogyList.innerHTML = '<li class="list-group-item text-center">Chargement des généalogies...</li>';

        try {
            const response = await fetch('/api/genealogies');
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            const genealogies = await response.json();

            genealogyList.innerHTML = ''; // Clear loading message

            if (genealogies.length === 0) {
                genealogyList.innerHTML = '<li class="list-group-item text-center text-muted">Aucune généalogie trouvée.</li>';
            } else {
                genealogies.forEach(genealogy => {
                    const listItem = document.createElement('li');
                    listItem.className = 'list-group-item d-flex justify-content-between align-items-center';
                    listItem.innerHTML = `
                        <a href="/genealogy/${genealogy.name}">${genealogy.name}</a>
                        <div>
                            <a href="/genealogies/${genealogy.name}/import" class="btn btn-sm btn-info mr-2">
                                <i class="fas fa-upload mr-1"></i> Importer GEDCOM
                            </a>
                            <a href="/genealogies/${genealogy.name}/export" class="btn btn-sm btn-primary">
                                <i class="fas fa-download mr-1"></i> Exporter GEDCOM
                            </a>
                        </div>
                    `;
                    genealogyList.appendChild(listItem);
                });
            }

        } catch (error) {
            console.error('Erreur lors du chargement des généalogies:', error);
            genealogyList.innerHTML = '<li class="list-group-item text-center text-danger">Erreur lors du chargement. Veuillez réessayer.</li>';
        }
    }
  </script>
</body>
</html>
