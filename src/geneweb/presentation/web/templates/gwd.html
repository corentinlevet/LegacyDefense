<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeneWeb - Choisir une base</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Choisir une généalogie</h4>
            <a href="/" class="btn btn-sm btn-outline-secondary">
              <i class="fas fa-home mr-1"></i> Accueil
            </a>
          </div>
          <div class="card-body">
            <p class="text-muted">Entrez le nom de la base de données que vous souhaitez consulter.</p>
            <form class="form-inline">
              <div class="input-group w-100">
                <input type="text" class="form-control" placeholder="Nom de la base" aria-label="Nom de la base">
                <div class="input-group-append">
                  <button class="btn btn-primary" type="submit">Ouvrir</button>
                </div>
              </div>
            </form>
            <hr>
            <h6 class="mt-4">Bases disponibles :</h6>
            <p class="text-muted">(La liste des bases de données apparaîtra ici prochainement)</p>
            <ul class="list-group">
              <!-- Exemple (sera rempli dynamiquement) -->
              <!-- 
              <li class="list-group-item"><a href="#">ma_base_de_test</a></li>
              <li class="list-group-item"><a href="#">base_principale</a></li>
              -->
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
