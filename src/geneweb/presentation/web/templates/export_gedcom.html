<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exporter la Généalogie</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Exporter la généalogie : {{ genealogy_name }}</h4>
                        <a href="/gwd" class="btn btn-sm btn-outline-secondary">
                            <i class="fas fa-arrow-left mr-1"></i> Retour aux généalogies
                        </a>
                    </div>
                    <div class="card-body text-center">
                        <p class="lead">Votre fichier GEDCOM est prêt à être téléchargé.</p>
                        <button id="downloadBtn" class="btn btn-primary btn-lg mt-3">
                            <i class="fas fa-download mr-2"></i> Télécharger {{ genealogy_name }}.ged
                        </button>
                        <p class="mt-3 text-muted">Le téléchargement devrait commencer automatiquement. Si ce n'est pas le cas, cliquez sur le bouton ci-dessus.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlPathParts = window.location.pathname.split('/');
            const genealogyName = urlPathParts[urlPathParts.length - 2]; // Assumes /genealogies/{name}/export

            // Update the title with the genealogy name
            document.querySelector('h4.mb-0').textContent = `Exporter la généalogie : ${genealogyName}`;

            document.getElementById('downloadBtn').addEventListener('click', async function() {
                try {
                    const response = await fetch(`/api/genealogies/${genealogyName}/export`);
                    
                    if (response.ok) {
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `${genealogyName}.ged`;
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(url);
                        document.body.removeChild(a);
                    } else {
                        alert('Erreur lors du téléchargement du fichier GEDCOM.');
                    }
                } catch (error) {
                    console.error('Erreur réseau lors de l\'export:', error);
                    alert('Une erreur réseau est survenue lors de l\'export.');
                }
            });
        });
    </script>
</body>
</html>
